<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable | Studio Veinard</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Saira:wght@500;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#1a1a1a;color:#f2f3ef;font-family:'Saira',system-ui,sans-serif;text-align:center;padding:24px}
.code{font-family:'Anton',sans-serif;font-size:clamp(90px,24vw,220px);line-height:.9;color:#e3ff3a}
.label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(242,243,239,.55)}
p{margin:0;font-weight:500;font-size:17px;color:rgba(242,243,239,.82)}
a{display:inline-flex;margin-top:14px;background:#e3ff3a;color:#161616;font-weight:800;font-size:14px;letter-spacing:.04em;text-transform:uppercase;padding:15px 24px;text-decoration:none;clip-path:polygon(0 0,100% 0,100% 100%,14px 100%,0 calc(100% - 14px))}
a:hover{filter:brightness(1.08)}
:focus-visible{outline:2px solid #e3ff3a;outline-offset:2px}
</style>
</head>
<body>
<div class="label">Erreur / Page introuvable</div>
<div class="code">404</div>
<p>Cette page n'existe pas — ou plus.</p>
<a href="/">← Retour à l'accueil</a>
